<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Shiphouse brings cracked founders under one roof and helps them get funded."
    />
    <title>Shiphouse</title>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="shortcut icon" href="./assets/favicon.svg" />
    <link rel="apple-touch-icon" href="./assets/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:opsz,wght@14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="hero" aria-labelledby="hero-title">
      <picture class="hero__media">
        <source
          srcset="./assets/shiphouse-hero-mobile.png"
          media="(max-width: 720px)"
        />
        <img
          class="hero__image"
          src="./assets/shiphouse-hero.png"
          alt="Founders working together at a round table in a sunlit classical terrace overlooking the sea."
        />
      </picture>
      <div class="hero__shade" aria-hidden="true"></div>

      <section class="hero__content">
        <p class="hero__brand">Shiphouse</p>
        <h1 id="hero-title">
          <span>Only Place to</span>
          <span>actually ship</span>
        </h1>
        <p class="hero__copy">
          Bringing some of the most cracked founders under one roof &amp;
          helping them getting funded
        </p>
        <a class="hero__button" href="./apply/">
          Apply for Upcoming Cohort
        </a>
      </section>
    </main>
  </body>
</html>
